name: Generate EPG

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests beautifulsoup4 lxml

      - name: Generate KVF EPG
        working-directory: kvf
        run: python kvf_epg_generator.py

      - name: Generate RUV EPG
        working-directory: ruv
        run: python ruv_epg_generator.py

      - name: Commit XML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add kvf/kvf.xml ruv/ruv.xml ruv/ruv2.xml

          git diff --staged --quiet || git commit -m "Update EPG"

          git push